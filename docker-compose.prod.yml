version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-saas-prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      NEXT_PUBLIC_CURRENCY_DEFAULT: ${NEXT_PUBLIC_CURRENCY_DEFAULT}
      NEXT_PUBLIC_LANGUAGE_DEFAULT: ${NEXT_PUBLIC_LANGUAGE_DEFAULT}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS}
    networks:
      - finance-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  finance-network:
    driver: bridge
