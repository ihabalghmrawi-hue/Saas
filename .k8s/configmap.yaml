apiVersion: v1
kind: ConfigMap
metadata:
  name: finance-config
  namespace: finance
data:
  app_version: '1.0.0'
  log_level: info
  next_public_app_name: FinanceERP
  next_public_currency_default: SAR
  next_public_language_default: ar
  super_admin_emails: admin@example.com
  redis_cluster_mode: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: finance-secrets
  namespace: finance
type: Opaque
stringData:
  supabase_url: ${NEXT_PUBLIC_SUPABASE_URL}
  supabase_anon_key: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
  supabase_service_role_key: ${SUPABASE_SERVICE_ROLE_KEY}
  session_secret: ${SESSION_SECRET}
  redis_url: ${REDIS_URL}
  redis_sentinel_urls: ${REDIS_SENTINEL_URLS}
