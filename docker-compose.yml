services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-saas-app
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      redis:
        condition: service_started
    networks:
      - finance-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: finance-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-dev-data:/data
    networks:
      - finance-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis-dev-data:
    driver: local

networks:
  finance-network:
    driver: bridge
