services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: finance-saas-app

    ports:
      - "3000:3000"

    env_file:
      - .env.local

    environment:
      NODE_ENV: development

    volumes:
      - ./src:/app/src
      - ./public:/app/public

    depends_on:
      - redis

    networks:
      - finance-network

    restart: unless-stopped

  admin:
    build:
      context: ../financeapp-admin
      dockerfile: Dockerfile

    container_name: finance-saas-admin

    ports:
      - "3001:3001"

    env_file:
      - ../financeapp-admin/.env.local

    environment:
      NODE_ENV: production

    networks:
      - finance-network

    restart: unless-stopped

  redis:
    image: redis:alpine

    container_name: finance-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

    networks:
      - finance-network

networks:
  finance-network:
    driver: bridge