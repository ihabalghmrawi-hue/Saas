route:
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - receiver: 'critical-pager'
      match:
        severity: critical
      repeat_interval: 30m
    - receiver: 'warning-slack'
      match:
        severity: warning

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://finance-saas:3000/api/alerts'
        send_resolved: true

  - name: 'critical-pager'
    webhook_configs:
      - url: 'http://finance-saas:3000/api/alerts'
        send_resolved: true

  - name: 'warning-slack'
    webhook_configs:
      - url: 'http://finance-saas:3000/api/alerts'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'service']
