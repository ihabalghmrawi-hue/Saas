global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'finance-saas'
    static_configs:
      - targets: ['finance-saas:3000']
    metrics_path: '/metrics'
    scheme: http

  - job_name: 'finance-workers'
    static_configs:
      - targets:
          - 'finance-worker-accounting:9090'
          - 'finance-worker-reconciliation:9090'
          - 'finance-worker-recurring:9090'
          - 'finance-worker-backup:9090'
    metrics_path: '/metrics'
    scheme: http

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    scheme: http

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alerts.yml'
